<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini App Đầu Tay</title>
    <!-- Thư viện Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🎉 Chào mừng bạn!</h1>
    <p id="user-info">Đang tải thông tin người dùng...</p>

    <script>
        // Kết nối với Telegram
        const tg = window.Telegram.WebApp;

        // Báo cho Telegram biết app đã sẵn sàng hiển thị
        tg.ready();

        // Lấy dữ liệu người dùng (chỉ hoạt động khi mở trong Telegram)
        const user = tg.initDataUnsafe?.user;
        const infoElement = document.getElementById('user-info');

        if (user) {
            infoElement.innerText = `Xin chào ${user.first_name}! ID của bạn là ${user.id}.`;
        } else {
            infoElement.innerText = 'Bạn đang xem bên ngoài Telegram. Vào bot để trải nghiệm thật nhé!';
        }

        // Đặt màu nền và chữ theo theme của Telegram
        document.body.style.backgroundColor = tg.backgroundColor;
        document.body.style.color = tg.textColor;
    </script>
</body>
</html>
